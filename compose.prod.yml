services:
  sdsa:
    image: ghcr.io/defai-digital/sdsa:1.1.2
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SDSA_FORWARDED_ALLOW_IPS: "*"
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    restart: unless-stopped
    # Optional project-specific policy override:
    # volumes:
    #   - ./sdsa-policy.json:/app/sdsa-policy.json:ro

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - sdsa
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/sdsa.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=16m
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
